<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ControlRoom &middot; Portfolio status board</title>
    <meta
      name="description"
      content="Public status board for every portfolio project -- health, deploys, commits."
    />
    <!-- Favicon mirrors the orange-square mark already in the TopBar (#88). -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='6' width='20' height='20' fill='%23FF6A13'/></svg>"
    />
    <script>
      // Apply the saved theme before React mounts so there's no flash.
      // Default is dark; only "light" opts out.
      (function () {
        try {
          var p = localStorage.getItem("controlroom:theme");
          if (p !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body
    class="min-h-screen bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 antialiased font-sans"
  >
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
