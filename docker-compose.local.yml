# Local development dependencies for controlroom: Postgres + Redis.
# This is NOT the production compose -- production runs inside the shared
# `pritika` network on the host VM via docker-compose.yml.
#
# Quick start:
#   docker compose -f docker-compose.local.yml up -d
#   psql $DATABASE_URL -c 'SELECT 1'
#
# Stop:
#   docker compose -f docker-compose.local.yml down
# Wipe data:
#   docker compose -f docker-compose.local.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: controlroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: controlroom
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: controlroom
    ports:
      - "5432:5432"
    volumes:
      - controlroom_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlroom -d controlroom"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: controlroom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - controlroom_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  controlroom_pg_data:
  controlroom_redis_data:
