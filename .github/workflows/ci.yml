name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript actions (checkout, setup-node) onto the runner's Node 24
# ahead of the June 2026 forced cutover so we stop seeing the deprecation
# warning on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Jobs run sequentially via `needs:` so a failure short-circuits the rest of
# the pipeline instead of burning CI minutes on every checker for an
# already-broken PR. Order is cheapest first: lint, typecheck, test, build.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm audit --omit=dev --audit-level=high

  typecheck:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    needs: typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: controlroom
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: controlroom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U controlroom -d controlroom_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://controlroom:testpass@localhost:5432/controlroom_test
      REDIS_URL: redis://localhost:6379/12
      GITHUB_PAT: github_pat_test_placeholder_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      GITHUB_WEBHOOK_SECRET: ci-test-webhook-secret-32-chars-minxx
      NODE_ENV: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run migrate || echo 'no migrations yet'
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 7
